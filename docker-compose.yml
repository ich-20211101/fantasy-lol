version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: fantasy-lol-postgres
    environment:
      POSTGRES_DB: fantasy_lol
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: fantasy1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fantasy -d fantasy_lol"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.2-alpine
    container_name: fantasy-lol-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fantasy-lol-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fantasy_lol
      SPRING_DATASOURCE_USERNAME: fantasy
      SPRING_DATASOURCE_PASSWORD: fantasy1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  postgres-data:
  redis-data: